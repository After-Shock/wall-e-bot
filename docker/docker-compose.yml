# =============================================================================
# Wall-E Bot - Production Docker Compose
# =============================================================================
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down
#
# This configuration is optimized for production with:
#   - Multi-stage builds for smaller images
#   - Health checks for reliability
#   - Automatic restart policies
#   - Internal networking (no exposed DB ports)
#   - Memory limits to prevent OOMKiller data corruption
#   - Redis AOF persistence to survive restarts
#   - Docker log rotation to prevent disk exhaustion
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: wall-e-postgres
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      POSTGRES_USER: ${DB_USER:-wallE}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-wall_e_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wallE} -d ${DB_NAME:-wall_e_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wall-e-network
    # Note: No ports exposed - only accessible within Docker network

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  # AOF persistence enabled: data survives container restarts.
  # maxmemory-policy allkeys-lru: evict least-recently-used keys when full.
  redis:
    image: redis:7-alpine
    container_name: wall-e-redis
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wall-e-network
    # Note: No ports exposed - only accessible within Docker network

  # ---------------------------------------------------------------------------
  # Discord Bot
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
      target: production
    container_name: wall-e-bot
    init: true
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-wallE}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-wall_e_bot}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=400"
    env_file:
      - ../.env
    networks:
      - wall-e-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Note: Bot doesn't expose ports - outbound only to Discord API

  # ---------------------------------------------------------------------------
  # Dashboard Backend (API)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: production
    container_name: wall-e-backend
    init: true
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-wallE}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-wall_e_bot}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
      NODE_OPTIONS: "--max-old-space-size=400"
    env_file:
      - ../.env
    networks:
      - wall-e-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Dashboard Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: production
      args:
        - VITE_BOT_OWNER_ID=${BOT_OWNER_ID}
        - VITE_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
        - VITE_API_URL=${VITE_API_URL}
    container_name: wall-e-frontend
    init: true
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wall-e-network
      - pangolin
    security_opt:
      - no-new-privileges:true

# =============================================================================
# Volumes - Persistent storage
# =============================================================================
volumes:
  postgres_data:
  redis_data:     # Redis AOF data

# =============================================================================
# Networks - Internal communication
# =============================================================================
networks:
  wall-e-network:
    driver: bridge
  pangolin:
    external: true
